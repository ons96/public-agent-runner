name: Auto Task Worker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Task-board issue number to execute'
        required: false
        type: string
      target_repo:
        description: 'Target repo (e.g. ons96/LLM-API-Key-Proxy)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      - name: Fetch task from task-board
        id: task
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          if [ -z "$ISSUE" ]; then
            echo "Polling task-board for next task..."
            ISSUES=$(gh issue list \
              --repo ons96/task-board \
              --label "status:new" \
              --label "priority:P0,P1,P2" \
              --json number,title,labels \
              --limit 20 \
              --state open 2>/dev/null)
            if [ -z "$ISSUES" ] || [ "$ISSUES" = "[]" ]; then
              echo "No pending tasks found"
              echo "has_task=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            ISSUE=$(echo "$ISSUES" | python3 -c "
import json, sys
issues = json.load(sys.stdin)
for i in issues:
    labels = [l['name'] for l in i.get('labels', [])]
    if not any(l.startswith('locked-by:') for l in labels):
        print(i['number'])
        break
" 2>/dev/null || echo "")
            if [ -z "$ISSUE" ]; then
              echo "All pending tasks are locked"
              echo "has_task=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"
          gh issue view "$ISSUE" --repo ons96/task-board --json number,title,body,labels > /tmp/task-issue.json
          echo "title=$(python3 -c "import json; print(json.load(open('/tmp/task-issue.json'))['title'])" 2>/dev/null || echo 'Task')" >> "$GITHUB_OUTPUT"
          TARGET_REPO="${{ inputs.target_repo }}"
          if [ -z "$TARGET_REPO" ]; then
            TARGET_REPO=$(python3 -c "
import json
d = json.load(open('/tmp/task-issue.json'))
labels = [l['name'] for l in d.get('labels', [])]
MAP = {
    'task-board': 'ons96/task-board',
    'vps-gh-agent-loop': 'ons96/vps-gh-agent-loop',
    'task-vault': 'ons96/task-vault',
    'ideas-dispatcher': 'ons96/ideas-dispatcher',
    'public-agent-runner': 'ons96/public-agent-runner',
    'agentic-gateway': 'ons96/agentic_gateway',
    'llm-gateway': 'ons96/LLM-API-Key-Proxy',
    'llm-api-key-proxy': 'ons96/LLM-API-Key-Proxy',
    'llm-leaderboard': 'ons96/llm-leaderboard',
    'llm-provider-manager': 'ons96/llm-provider-manager',
    'agent-loop': 'ons96/vps-gh-agent-loop',
    'esim-finder': 'ons96/esim-lowest-cost-finder',
    'opencode-config': 'ons96/opencode-omo-config',
}
for l in labels:
    if l.startswith('project:'):
        proj = l.replace('project:', '')
        print(MAP.get(proj, ''))
        break
" 2>/dev/null || echo "")
          fi
          echo "target_repo=$TARGET_REPO" >> "$GITHUB_OUTPUT"
          echo "has_task=true" >> "$GITHUB_OUTPUT"

      - name: Lock task (claim)
        if: steps.task.outputs.has_task == 'true'
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          ISSUE="${{ steps.task.outputs.issue_number }}"
          gh issue edit "$ISSUE" \
            --repo ons96/task-board \
            --add-label "status:in_progress" \
            --remove-label "status:new" \
            --add-label "locked-by:public-runner" 2>/dev/null || true
          gh issue comment "$ISSUE" \
            --repo ons96/task-board \
            --body "Dispatched to public runner (run #${{ github.run_id }}) at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" 2>/dev/null || true

      - name: Build packet
        if: steps.task.outputs.has_task == 'true'
        id: packet
        run: |
          python3 -c "
import json, os
d = json.load(open('/tmp/task-issue.json'))
issue = d['number']
title = d['title']
body = (d.get('body') or 'Implement the requested change')[:3000]
target_repo = os.environ.get('TARGET_REPO', '')
branch = f'agent/task-{issue}-' + __import__('datetime').datetime.now().strftime('%Y%m%d-%H%M%S')
packet = {
    'task_id': f'task-{issue}',
    'target_repo': target_repo,
    'target_branch': 'main',
    'work_branch': branch,
    'task_summary': title,
    'task': body,
    'issue_number': str(issue),
    'mode': 'implement',
    'draft_pr': False,
}
json.dump(packet, open('/tmp/packet.json', 'w'), indent=2)
print(json.dumps(packet, indent=2))
" 2>/dev/null
          echo "packet=/tmp/packet.json" >> "$GITHUB_OUTPUT"

      - name: Validate packet
        if: steps.task.outputs.has_task == 'true'
        run: python3 runner/validate_packet.py /tmp/packet.json

      - name: Execute task
        id: execute
        if: steps.task.outputs.has_task == 'true'
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME || 'public-runner-bot' }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL || 'bot@public-runner.local' }}
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          TARGET_ROOT=$(bash runner/checkout_target.sh /tmp/packet.json target-repo)
          bash runner/run_agent.sh /tmp/packet.json "$TARGET_ROOT"
          PR_URL=$(bash runner/push_branch_and_pr.sh /tmp/packet.json "$TARGET_ROOT" 2>&1 || echo "")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "$PR_URL"
          python3 runner/report_result.py /tmp/packet.json "$PR_URL" runner-result.json
          cat runner-result.json

      - name: Report back to task-board
        if: steps.task.outputs.has_task == 'true'
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          ISSUE="${{ steps.task.outputs.issue_number }}"
          PR_URL="${{ steps.execute.outputs.pr_url }}"
          python3 -c "
import json
result = json.load(open('runner-result.json'))
status = result.get('status', 'failed')
pr_url = result.get('pr_url', '')
print(f'PR URL: {pr_url}')
print(f'Status: {status}')
" 2>/dev/null || true
          if [ -n "$PR_URL" ]; then
            gh issue edit "$ISSUE" \
              --repo ons96/task-board \
              --add-label "status:done" \
              --remove-label "status:in_progress" \
              --remove-label "locked-by:public-runner" 2>/dev/null || true
            gh issue comment "$ISSUE" \
              --repo ons96/task-board \
              --body "Execution complete (run #${{ github.run_id }}). PR created: $PR_URL" 2>/dev/null || true
          else
            gh issue edit "$ISSUE" \
              --repo ons96/task-board \
              --remove-label "locked-by:public-runner" 2>/dev/null || true
            gh issue comment "$ISSUE" \
              --repo ons96/task-board \
              --body "Execution failed (run #${{ github.run_id }}). Check logs for details." 2>/dev/null || true
          fi

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-result-${{ steps.task.outputs.issue_number || 'unknown' }}
          path: runner-result.json
          retention-days: 7
