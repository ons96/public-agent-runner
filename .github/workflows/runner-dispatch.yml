name: Public Runner Dispatch

on:
  repository_dispatch:
    types: [task-packet, code-task, answer-questions]
  workflow_dispatch:
    inputs:
      packet_json:
        description: "Sanitized task packet JSON"
        required: true
        type: string

jobs:
  validate-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      - name: Materialize packet
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            EVENT_TYPE="${{ github.event.action }}"
            if [ "$EVENT_TYPE" = "code-task" ]; then
              # Simple format from orchestrator: { repo, task }
              cat > task-packet.json << 'EOF'
          {
            "target_repo": "${{ github.event.client_payload.repo }}",
            "task": "${{ github.event.client_payload.task }}",
            "branch": "agent/auto-$(date +%Y%m%d-%H%M%S)",
            "mode": "implement"
          }
          EOF
            else
              # Full packet format
              printf '%s' '${{ github.event.client_payload.packet_json }}' > task-packet.json
            fi
          else
            printf '%s' '${{ inputs.packet_json }}' > task-packet.json
          fi
          cat task-packet.json

      - name: Validate packet
        run: python3 runner/validate_packet.py task-packet.json

      - name: Execute workflow
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME || 'public-runner-bot' }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL || 'bot@public-runner.local' }}
        run: |
          TARGET_ROOT=$(bash runner/checkout_target.sh task-packet.json target-repo)
          bash runner/run_agent.sh task-packet.json "$TARGET_ROOT"
          PR_URL=$(bash runner/push_branch_and_pr.sh task-packet.json "$TARGET_ROOT")
          python3 runner/report_result.py task-packet.json "$PR_URL" runner-result.json

      - name: Upload runner result
        uses: actions/upload-artifact@v4
        with:
          name: runner-result
          path: runner-result.json
